defaults:
  - track: memory_state
  - trainer: default
  - runtime: default
  - logging: tensorboard
  - experiment: lm_gated
  - _self_

project:
  name: bumblebee

trainer:
  seq_len: 128
  batch_size: 4
  max_steps: 100
  grad_clip: 1.0
  warmup_steps: 10

hydra:
  run:
    dir: ${runtime.output_root}/${track.slug}/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ${runtime.multirun_root}/${track.slug}/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  job:
    chdir: false
