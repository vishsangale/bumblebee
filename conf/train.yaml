defaults:
  - track: memory_state
  - trainer: default
  - runtime: default
  - logging: tensorboard
  - experiment: smoke
  - _self_

project:
  name: bumblebee

hydra:
  run:
    dir: ${runtime.output_root}/${track.slug}/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ${runtime.multirun_root}/${track.slug}/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  job:
    chdir: true
