defaults:
  - track: memory_state
  - runtime: default
  - model: phi35_mini
  - evaluator: memory_proxy_quick
  - _self_

project:
  name: bumblebee

hydra:
  run:
    dir: ${runtime.output_root}/${track.slug}/eval/${model.name}/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ${runtime.multirun_root}/${track.slug}/eval/${model.name}/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  job:
    chdir: true
